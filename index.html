<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The FireHouse | Synthesis Dashboard</title>
    <style>
        :root {
            --bg-cream: #fdfaf3;
            --header-dark: #2d1b15;
            --pre: #8ca587;      
            --during: #d96e34;   
            --post: #b3513d;     
            --lt: #cc9c42;       
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg-cream); color: #4a3728; line-height: 1.6; }
        
        header { 
            background-color: var(--header-dark); 
            color: #fff; 
            padding: 5rem 1rem; /* Large padding for large logo */
            text-align: center; 
            border-bottom: 8px solid var(--during); 
        }

        /* MASSIVE LOGO STYLING */
        .logo-container {
            margin: 0 auto;
            max-width: 850px; /* Maximum width for high-impact branding */
            width: 90%;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            /* Blends out non-transparent backgrounds on dark headers */
            mix-blend-mode: screen; 
            filter: drop-shadow(0 0 20px rgba(217, 110, 52, 0.4));
        }

        header p { 
            margin: 2rem 0 0 0; 
            opacity: 0.9; 
            font-style: italic; 
            letter-spacing: 3px; 
            font-size: 1.3rem;
            text-transform: uppercase;
            font-weight: 300;
        }

        .mission-box { 
            max-width: 850px; 
            margin: -3rem auto 3rem; 
            background: white; 
            padding: 3rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(45, 27, 21, 0.15); 
            text-align: center; 
            border: 1px solid #e9e2d5; 
            position: relative; 
            z-index: 10; 
        }
        .mission-box h2 { color: var(--header-dark); margin-top: 0; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem 5rem; text-align: center; }
        .status-bar { background: #fff; padding: 10px 35px; border-radius: 50px; font-size: 0.85rem; margin-bottom: 3rem; display: inline-block; font-weight: bold; border: 1px solid #e9e2d5; color: #888; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .phase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; margin-bottom: 4rem; }
        
        .card { background: white; border-radius: 20px; padding: 2.5rem 1.5rem; box-shadow: 0 8px 24px rgba(45, 27, 21, 0.05); border-top: 10px solid #ccc; min-height: 220px; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .card.pre { border-color: var(--pre); }
        .card.during { border-color: var(--during); }
        .card.post { border-color: var(--post); }
        .card.lt { border-color: var(--lt); }
